server {
    listen 80;
    server_name localhost;

    # Static content serving (Frontend)
    location / {
        root /usr/share/nginx/html;
        index index.html index.htm;
        # For SPA (Single Page Application) - redirect to index.html
        try_files $uri $uri/ /index.html;
    }

    # AI explanation endpoint — LLM inference on CPU can take several minutes.
    # Must be declared BEFORE the generic /api/ block (longest-prefix wins).
    location /api/ai/ {
        proxy_pass http://backend:8000;
        proxy_set_header Host               $host;
        proxy_set_header Authorization      $http_authorization;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_connect_timeout  30s;
        proxy_send_timeout    360s;
        proxy_read_timeout    360s;   # 6 min — covers even slow CPU inference
    }

    # Proxying requests to backend (API)
    location /api/ {
        proxy_pass http://backend:8000; # "backend" is the service name from docker-compose
        proxy_set_header Host               $host;
        proxy_set_header Authorization      $http_authorization;
        proxy_set_header X-Real-IP          $remote_addr;
        proxy_set_header X-Forwarded-For    $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto  $scheme;

        proxy_connect_timeout  30s;
        proxy_send_timeout     60s;
        proxy_read_timeout     60s;
    }

    # WebSocket for logs
    location /ws-analyzer {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "Upgrade";
        proxy_set_header Host       $host;
    }
}